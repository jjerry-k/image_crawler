services:
  
  backend:
    build: 
      dockerfile: Dockerfile
      context: ./backend
    volumes:
      - ./backend:/app
      - ./utils:/app/utils
      - ${DATA_ROOT:-/sdcard/Data}:/Data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Seoul
      - CRAWLING_ROOT=/Data/Crawling
      - CRAWLING_TEST_ROOT=/Data/Crawling/_test
      - CHROMEDRIVER=/usr/bin/chromedriver
      - CHROME_BINARY=/usr/bin/chromium
      - MONGO_INIT_TIMEOUT_SECONDS=60
    networks:
      - backend
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
  frontend:
    build:
      dockerfile: Dockerfile
      context: ./frontend
    environment:
      - TZ=Asia/Seoul
      - BACKEND_BASE_URL=http://backend:5000
      - AUTO_REFRESH_SECONDS=60
      - PORT=3000
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    networks:
      - backend
    depends_on:
      backend:
        condition: service_healthy
  mongo:
    image: mongo:3.6
    volumes:
      - ${MONGO_DATA_ROOT:-/sdcard/Data/mongo}:/data/db
    ports:
      - "27017:27017"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "127.0.0.1/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    
networks:
  backend:
    driver: bridge
